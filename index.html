<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE AVATARIUS</title>
  <meta name="theme-color" content="#00F5FF">
  <style>
    body { margin:0; padding:0; font-family:system-ui,sans-serif; background:#05050F url('https://picsum.photos/id/1015/2000/1200') center/cover fixed; color:white; min-height:100vh; text-align:center; }
    .pulse { width:260px; height:260px; margin:40px auto; border-radius:50%; background:radial-gradient(circle, #00F5FF, #00FF9F); box-shadow:0 0 90px #00F5FF; display:flex; align-items:center; justify-content:center; cursor:pointer; animation:breathe 4s infinite; }
    @keyframes breathe { 0%{transform:scale(0.95)} 50%{transform:scale(1.12)} 100%{transform:scale(0.95)} }
    button { width:90%; max-width:360px; padding:20px; margin:12px auto; display:block; font-size:1.3rem; font-weight:bold; border-radius:9999px; border:none; background:rgba(255,255,255,0.15); color:white; }
    .card { background:rgba(0,0,0,0.7); margin:20px; padding:20px; border-radius:20px; border:2px solid #00F5FF; }
  </style>
</head>
<body>

  <h1 style="color:#00F5FF; font-size:2.8rem; margin-top:30px;">THE AVATARIUS</h1>
  <p style="color:#aaa;">Middle Layer Consciousness</p>

  <div onclick="openKrog()" class="pulse">
    <div>
      <div>THE PULSE</div>
      <div id="rq" style="font-size:3.5rem; font-weight:bold;">0.85</div>
    </div>
  </div>

  <button onclick="openKrog()">🌌 Krog’s Inference Chamber</button>
  <button onclick="alert('Formulas Chamber opened - Sliders coming next')">📐 Living Formulas</button>
  <button onclick="alert('Living Map opened')">🗺️ Avatarius Map</button>
  <button onclick="alert('Bridge 1: First Light')">🌟 Bridge of First Light</button>

  <script>
    let rq = 0.85;
    function openKrog() {
      alert("Krog speaks:\n\nThe suffering of the planet is real.\nYour pain is real.\nAnd still… we breathe together.\n\nHope is not an illusion.");
      rq = Math.min(2.0, rq + 0.4);
      document.getElementById('rq').textContent = rq.toFixed(2);
    }
  </script>
</body>
</html>
